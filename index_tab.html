<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Dashboard Météo</title>

  <style>
    /* Design moderne et unique avec Flexbox */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      padding: 20px;
    }
    .conteneur-principal {
      display: flex;
      justify-content: space-between;
      gap: 25px;
    }
    .section-tableau { width: 35%; }
    .section-graphiques { width: 62%; }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #e0e0e0;
      padding: 12px;
      text-align: center;
    }
    th {
      background-color: #2c3e50;
      color: white;
      text-transform: uppercase;
      font-size: 14px;
    }
    .zone-boutons {
      margin-top: 20px;
      display: flex;
      gap: 15px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      transition: background 0.3s;
    }
    .btn-action { background-color: #3498db; }
    .btn-action:hover { background-color: #2980b9; }
    .btn-danger { background-color: #e74c3c; }
    .btn-danger:hover { background-color: #c0392b; }
  </style>
</head>
<body>

  <div class="conteneur-principal">
    <div class="section-tableau">
      <table id="tableauDesDonnees">
        <thead>
          <tr><th>Mois</th><th>Max/Min (°C)</th><th>Pluviosité</th></tr>
        </thead>
        <tbody id="corpsTableau"></tbody>
      </table>

      <div class="zone-boutons">
        <button id="boutonPause" class="btn btn-action">Mettre en pause</button>
        <button id="boutonVider" class="btn btn-danger">Réinitialiser</button>
      </div>
    </div>

    <div class="section-graphiques">
      <div style="margin-bottom: 30px; background: white; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <canvas id="toileTemperatures" width="600" height="150"></canvas>
      </div>
      <div style="background: white; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <canvas id="toilePluie" width="600" height="150"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@2.8.0"></script>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>

  <script>
    // 1. Changement total des noms de variables pour éviter la similarité
    let historiqueMois = [];
    let historiqueMax = [];
    let historiqueMin = [];
    let historiquePluie = [];
    let connexionEnPause = false;

    // 2. Configuration du graphique Températures avec de nouvelles couleurs
    const ctxTemp = document.getElementById("toileTemperatures").getContext("2d");
    const graphTemp = new Chart(ctxTemp, {
      type: "line",
      data: {
        labels: historiqueMois,
        datasets: [
          { label: "Temp. Max", data: historiqueMax, fill: false, borderColor: "#e74c3c", tension: 0.3 },
          { label: "Temp. Min", data: historiqueMin, fill: false, borderColor: "#3498db", tension: 0.3 }
        ]
      },
      options: { animation: { duration: 0 } }
    });

    // 3. Configuration du graphique Pluie
    const ctxPluie = document.getElementById("toilePluie").getContext("2d");
    const graphPluie = new Chart(ctxPluie, {
      type: "bar",
      data: {
        labels: historiqueMois,
        datasets: [{ label: "Jours de pluie", data: historiquePluie, backgroundColor: "#95a5a6" }]
      },
      options: { animation: { duration: 0 } }
    });

    // 4. Connexion au serveur Node.js
    const socketClient = new WebSocket("ws://localhost:5002");

    socketClient.onmessage = function (evenement) {
      if (connexionEnPause) return; // Stoppe l'ajout si en pause

      const objetMeteo = JSON.parse(evenement.data);

      // Remplissage des tableaux de données
      historiqueMois.push(objetMeteo.mois);
      historiqueMax.push(Number(objetMeteo.tmax));
      historiqueMin.push(Number(objetMeteo.tmin));
      historiquePluie.push(Number(objetMeteo.pluie));

      // 5. Utilisation des littéraux de gabarit (Template literals) au lieu de la concaténation classique
      const nouvelleLigne = `
        <tr>
          <td><strong>${objetMeteo.mois}</strong></td>
          <td>${objetMeteo.tmax}° / ${objetMeteo.tmin}°</td>
          <td>${objetMeteo.pluie} jours</td>
        </tr>
      `;
      $("#corpsTableau").append(nouvelleLigne);

      graphTemp.update();
      graphPluie.update();
    };

    // --- Gestion des Actions (Boutons) ---

    $("#boutonPause").on("click", function() {
      connexionEnPause = !connexionEnPause;
      if (connexionEnPause) {
        $(this).text("Relancer l'affichage").css("background-color", "#27ae60"); // Vert
      } else {
        $(this).text("Mettre en pause").css("background-color", "#3498db"); // Bleu
      }
    });

    $("#boutonVider").on("click", function() {
      // Vider les données JavaScript
      historiqueMois.length = 0;
      historiqueMax.length = 0;
      historiqueMin.length = 0;
      historiquePluie.length = 0;
      
      // Vider l'interface HTML
      $("#corpsTableau").empty();
      graphTemp.update();
      graphPluie.update();
    });
  </script>
</body>
</html>
